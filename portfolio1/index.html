<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- React and Babel for JSX transpilation in the browser -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <title>SAIKIRAN KURAPATI- Full-Stack Developer</title>
    <style>
        /* Custom font and smooth scrolling behavior */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726a?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        /* Animation for sections fading in on scroll */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-section {
            opacity: 0; /* Start hidden */
        }
        .fade-in-section.is-visible {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>
<body>
    <!-- The React app will be mounted into this div -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVG Icon Components ---
        const Mail = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
        );
        const Linkedin = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect width="4" height="12" x="2" y="9"></rect><circle cx="4" cy="4" r="2"></circle></svg>
        );
        const Github = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
        );
        const Download = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>
        );
        const Menu = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
        );
        const X = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        );
        const Trophy = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.45 1-1 1H5c-.55 0-1-.45-1-1v-2.34"/><path d="M15 14.66V17c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-2.34"/><path d="M8 21v-9c0-.55.45-1 1-1h6c.55 0 1 .45 1 1v9"/><path d="M6 9h12"/></svg>
        );

        // --- Main App Component ---
        const App = () => {
          const [isMenuOpen, setIsMenuOpen] = useState(false);

          // Smooth scrolling function
          const smoothScroll = (e, targetId) => {
            e.preventDefault();
            const targetElement = document.getElementById(targetId);
            if (targetElement) {
              const headerOffset = 80;
              const elementPosition = targetElement.getBoundingClientRect().top;
              const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
              window.scrollTo({ top: offsetPosition, behavior: "smooth" });
            }
            setIsMenuOpen(false);
          };

          // Effect for scroll animations
          useEffect(() => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, { threshold: 0.1 });

            const sections = document.querySelectorAll('.fade-in-section');
            sections.forEach(section => observer.observe(section));

            return () => sections.forEach(section => observer.unobserve(section));
          }, []);

          // Reusable component for navigation links
          const NavLinks = ({ className }) => (
            <ul className={className}>
              <li><a href="#about" onClick={(e) => smoothScroll(e, 'about')} className="hover:text-blue-600 transition-colors duration-300">About</a></li>
              <li><a href="#skills" onClick={(e) => smoothScroll(e, 'skills')} className="hover:text-blue-600 transition-colors duration-300">Skills</a></li>
              <li><a href="#projects" onClick={(e) => smoothScroll(e, 'projects')} className="hover:text-blue-600 transition-colors duration-300">Projects</a></li>
              <li><a href="#achievements" onClick={(e) => smoothScroll(e, 'achievements')} className="hover:text-blue-600 transition-colors duration-300">Achievements</a></li>
              <li><a href="#contact" onClick={(e) => smoothScroll(e, 'contact')} className="hover:text-blue-600 transition-colors duration-300">Contact</a></li>
            </ul>
          );

          return (
            <div className="text-slate-800 font-sans leading-normal tracking-wider">
              {/* Header & Navigation */}
              <header className="bg-white/90 backdrop-blur-sm fixed top-0 left-0 right-0 z-50 shadow-md">
                <div className="container mx-auto px-6 py-4 flex justify-between items-center">
                  <a href="#hero" onClick={(e) => smoothScroll(e, 'hero')} className="text-2xl font-bold text-blue-600 hover:text-blue-500 transition-colors duration-300">SK</a>
                  <nav className="hidden md:flex text-slate-700">
                    <NavLinks className="flex space-x-6" />
                  </nav>
                  <div className="md:hidden">
                    <button onClick={() => setIsMenuOpen(!isMenuOpen)} aria-label="Open menu" className="text-slate-700">
                      {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
                    </button>
                  </div>
                </div>
                {isMenuOpen && (
                  <div className="md:hidden bg-white/95 text-slate-700">
                     <NavLinks className="flex flex-col items-center space-y-4 py-4" />
                  </div>
                )}
              </header>

              <main>
                {/* Hero Section */}
                <section id="hero" className="min-h-screen flex items-center justify-center pt-20 fade-in-section">
                  <div className="container mx-auto px-6 text-center">
                    {/* --- SHIELD SVG PROFILE IMAGE --- */}
                    <svg width="180" height="180" viewBox="0 0 110 110" className="mx-auto mb-6 drop-shadow-lg">
                      <defs>
                        <clipPath id="shieldClip">
                           <path d="M55 5 L100 25 L100 75 L55 105 L10 75 L10 25 Z" />
                        </clipPath>
                      </defs>
                      <image clipPath="url(#shieldClip)" href="https://placehold.co/150x150/3B82F6/FFFFFF?text=SK" x="5" y="5" width="100" height="100" />
                      <path d="M55 5 L100 25 L100 75 L55 105 L10 75 L10 25 Z" fill="none" stroke="#3B82F6" strokeWidth="4"/>
                    </svg>
                    
                    <h1 className="text-5xl md:text-6xl font-extrabold text-slate-900 mb-2">SAIKIRAN</h1>
                    <p className="text-2xl text-blue-600 mb-8">Java & Web Developer</p>
                    <div className="flex justify-center space-x-6 mb-8">
                      <a href="https://github.com/saikiran1021" target="_blank" rel="noopener noreferrer" aria-label="GitHub Profile" className="text-slate-500 hover:text-blue-600 transition-colors duration-300"><Github size={30} /></a>
                      <a href="https://www.linkedin.com/in/kurapati-sai-kiran-93bbb8234" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn Profile" className="text-slate-500 hover:text-blue-600 transition-colors duration-300"><Linkedin size={30} /></a>
                      <a href="mailto:saikirankurapati57@gmail.com" aria-label="Email Me" className="text-slate-500 hover:text-blue-600 transition-colors duration-300"><Mail size={30} /></a>
                    </div>
                    <a href="https://drive.google.com/uc?export=download&id=1SglpmkssmP2pRg77MOiDcNncBlCaPdvX" target="_blank" rel="noopener noreferrer" className="bg-blue-600 bg-gradient-to-r hover:from-blue-600 hover:to-blue-700 text-white font-bold py-3 px-8 rounded-full transition-all duration-300 inline-flex items-center space-x-2 transform hover:scale-105 shadow-lg hover:shadow-blue-500/50">
                      <Download size={20} />
                      <span>Download Resume</span>
                    </a>
                  </div>
                </section>

                {/* About Section */}
                <section id="about" className="py-20 bg-slate-50/95 backdrop-blur-sm fade-in-section">
                  <div className="container mx-auto px-6">
                    <h2 className="text-4xl font-bold text-center mb-12 text-slate-900">About Me</h2>
                    <div className="max-w-3xl mx-auto text-center text-lg text-slate-700 space-y-4">
                      <p>
                        Hello! I'm Saikiran Kurapati, a passionate developer with a love for building elegant and efficient applications. With a background in computer science, I have a strong foundation in  Java and enjoy solving complex problems.
                      </p>
                      <p>
                        I also have experience building web applications with React and Node.js,  you can find me in exploring new technologies, contributing to open-source projects.
                      </p>
                    </div>
                  </div>
                </section>

                {/* Skills Section */}
                <section id="skills" className="py-20 bg-white/95 backdrop-blur-sm fade-in-section">
                  <div className="container mx-auto px-6">
                    <h2 className="text-4xl font-bold text-center mb-12 text-slate-900">Technical Skills</h2>
                    <div className="max-w-4xl mx-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8 text-center">
                      {['Java', 'JavaScript', 'React', 'Node.js', 'MySQL', 'HTML5', 'CSS3', 'Git & GitHub', 'REST APIs', 'SAP', 'Prompt Engineering', 'Oracle'].map(skill => (
                        <div key={skill} className="bg-slate-100 p-4 rounded-lg shadow-lg transform hover:-translate-y-2 transition-transform duration-300 hover:shadow-blue-500/20">
                          <p className="font-semibold text-blue-700">{skill}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                </section>

                {/* Projects Section */}
                <section id="projects" className="py-20 bg-slate-50/95 backdrop-blur-sm fade-in-section">
                  <div className="container mx-auto px-6">
                    <h2 className="text-4xl font-bold text-center mb-12 text-slate-900">My Projects</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-10">
                      {/* Project Card 1 */}
                      <div className="bg-white rounded-lg shadow-xl overflow-hidden transform hover:scale-105 transition-transform duration-300 hover:shadow-blue-500/20">
                        <img 
                          src="https://placehold.co/600x400/f1f5f9/3B82F6?text=The+Saviour" 
                          alt="The Saviour Blood Donation Project" 
                          className="w-full h-48 object-cover"
                        />
                        <div className="p-6">
                          <h3 className="text-2xl font-bold mb-2 text-blue-600">The Saviour - Blood Donation</h3>
                          <p className="text-slate-600 mb-4">A web platform to connect blood donors with recipients in need, featuring user registration and search functionality.</p>
                          <div className="mb-4">
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">Java</span>
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">React</span>
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">MySQL</span>
                          </div>
                          <div className="flex justify-end">
                            <a href="https://github.com/saikiran1021/BLOOD-DONATION" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline font-semibold">Source Code</a>
                          </div>
                        </div>
                      </div>
                      {/* Project Card 2 */}
                      <div className="bg-white rounded-lg shadow-xl overflow-hidden transform hover:scale-105 transition-transform duration-300 hover:shadow-blue-500/20">
                        <img 
                          src="https://placehold.co/600x400/f1f5f9/3B82F6?text=Mentor+Chatbot" 
                          alt="Self Correcting Mentor Chatbot Project" 
                          className="w-full h-48 object-cover"
                        />
                        <div className="p-6">
                          <h3 className="text-2xl font-bold mb-2 text-blue-600">Self-Correcting Mentor Chatbot</h3>
                          <p className="text-slate-600 mb-4">An AI-powered chatbot that provides guidance and learns from user interactions to improve its responses over time.</p>
                           <div className="mb-4">
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">Python</span>
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">NLP</span>
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">Prompt Engineering</span>
                          </div>
                          <div className="flex justify-end">
                            <a href="https://github.com/saikiran1021/Self_correcting-mentor-bot" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline font-semibold">Source Code</a>
                          </div>
                        </div>
                      </div>
                      {/* Project Card 3 */}
                      <div className="bg-white rounded-lg shadow-xl overflow-hidden transform hover:scale-105 transition-transform duration-300 hover:shadow-blue-500/20">
                        <img 
                          src="https://placehold.co/600x400/f1f5f9/3B82F6?text=Medicine+Recommender" 
                          alt="Medicine Recommender Project" 
                          className="w-full h-48 object-cover"
                        />
                        <div className="p-6">
                          <h3 className="text-2xl font-bold mb-2 text-blue-600">Medicine Recommender</h3>
                          <p className="text-slate-600 mb-4">A system that suggests over-the-counter medications based on user-reported symptoms, using a data-driven approach.</p>
                           <div className="mb-4">
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">Python</span>
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">Scikit-learn</span>
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">Flask</span>
                          </div>
                          <div className="flex justify-end">
                            <a href="#" className="text-blue-500 hover:underline font-semibold">Source Code</a>
                          </div>
                        </div>
                      </div>
                       {/* Project Card 4 */}
                       <div className="bg-white rounded-lg shadow-xl overflow-hidden transform hover:scale-105 transition-transform duration-300 hover:shadow-blue-500/20">
                        <img 
                          src="https://placehold.co/600x400/f1f5f9/3B82F6?text=Trip+Planner" 
                          alt="Trip Planner Project" 
                          className="w-full h-48 object-cover"
                        />
                        <div className="p-6">
                          <h3 className="text-2xl font-bold mb-2 text-blue-600">Trip Planner</h3>
                          <p className="text-slate-600 mb-4">A web application that helps users plan their travel itineraries by integrating with mapping and weather APIs.</p>
                           <div className="mb-4">
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">React</span>
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">Node.js</span>
                            <span className="bg-blue-100 text-blue-800 text-sm font-medium mr-2 px-2.5 py-0.5 rounded-full">Google Maps API</span>
                          </div>
                          <div className="flex justify-end">
                            <a href="#" className="text-blue-500 hover:underline font-semibold">Source Code</a>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </section>

                {/* Achievements Section */}
                <section id="achievements" className="py-20 bg-white/95 backdrop-blur-sm fade-in-section">
                  <div className="container mx-auto px-6">
                    <h2 className="text-4xl font-bold text-center mb-12 text-slate-900">Achievements</h2>
                    <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                      <div className="bg-slate-100 p-6 rounded-lg shadow-lg flex items-center space-x-4 transform hover:-translate-y-2 transition-transform duration-300 hover:shadow-blue-500/20">
                        <Trophy size={40} className="text-blue-500 flex-shrink-0"/>
                        <div>
                          <h3 className="text-xl font-bold text-blue-700">Winner, Technirvana 2024</h3>
                          <p className="text-slate-600">Chalapathi Institute of Engineering and Technology</p>
                        </div>
                      </div>
                      <div className="bg-slate-100 p-6 rounded-lg shadow-lg flex items-center space-x-4 transform hover:-translate-y-2 transition-transform duration-300 hover:shadow-blue-500/20">
                        <Trophy size={40} className="text-blue-500 flex-shrink-0"/>
                        <div>
                          <h3 className="text-xl font-bold text-blue-700">Winner, Ideathon 2024</h3>
                          <p className="text-slate-600">Chalapathi Institute of Engineering and Technology</p>
                        </div>
                      </div>
                    </div>
                    <div className="text-center mt-12">
                        <p className="text-lg text-slate-700 bg-slate-100 inline-block p-4 rounded-lg shadow-lg">Participated in around <strong>15 hackathons</strong>, gaining valuable experience in rapid prototyping and teamwork.</p>
                    </div>
                  </div>
                </section>

                {/* Contact Section */}
                <section id="contact" className="py-20 bg-slate-50/95 backdrop-blur-sm fade-in-section">
                  <div className="container mx-auto px-6 text-center">
                    <h2 className="text-4xl font-bold mb-4 text-slate-900">Get In Touch</h2>
                    <p className="text-lg text-slate-600 mb-8 max-w-2xl mx-auto">
                      I'm currently open to new opportunities and collaborations. If you have a project in mind or just want to say hello, feel free to reach out!
                    </p>
                    <a href="mailto:saikirankurapati57@gmail.com" className="bg-blue-600 bg-gradient-to-r hover:from-blue-600 hover:to-blue-700 text-white font-bold py-4 px-8 rounded-full transition-all duration-300 inline-flex items-center space-x-3 transform hover:scale-105 shadow-lg hover:shadow-blue-500/50">
                      <Mail size={22} />
                      <span>Say Hello</span>
                    </a>
                  </div>
                </section>
              </main>

              {/* Footer */}
              <footer className="bg-white/95 backdrop-blur-sm py-6">
                <div className="container mx-auto px-6 text-center text-slate-500">
                  <p>&copy; {new Date().getFullYear()} SAIKIRAN. All Rights Reserved.</p>
                  <p className="text-sm mt-2">Built with <a href="https://reactjs.org/" target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">React</a> & <a href="https://tailwindcss.com/" target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">Tailwind CSS</a></p>
                </div>
              </footer>
            </div>
          );
        };

        // --- Render the App to the DOM ---
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

    </script>
</body>
</html>
